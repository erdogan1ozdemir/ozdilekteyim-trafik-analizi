<!doctype html>
<html data-theme="light" data-palette="coral" data-layout="tabs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
<title>Özdilekteyim · AI Trafik Analizi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
<script src="brand.config.js"></script>
<script>
  (function(){
    var B = window.BRAND || {};
    if (B.lang) document.documentElement.setAttribute('lang', B.lang);
    document.title = [B.name, B.title].filter(Boolean).join(' · ') || 'Dashboard';
    // Apply brand accent immediately so first paint is on-brand.
    if (B.accent) {
      var s = document.createElement('style');
      s.textContent = ':root{--accent:'+B.accent+';--accent-deep:'+B.accent+';--accent-wash:color-mix(in srgb,'+B.accent+' 14%, white);}'
        + '[data-theme="dark"]{--accent-wash:color-mix(in srgb,'+B.accent+' 22%, #141C1A);}';
      document.head.appendChild(s);
    }
  })();
</script>

<!-- Supplementary styles for AI-traffic-specific components (prefixed .ai-*) -->
<style>
  .content { max-width: 1200px; margin: 0 auto; padding: 22px 24px 90px; }
  .ai-toc { position: sticky; top: 78px; z-index: 30; display: flex; flex-wrap: wrap; gap: 6px;
    background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 8px 10px; margin-bottom: 18px; box-shadow: var(--shadow-card); }
  .ai-toc a { font-size: 12px; font-weight: 600; color: var(--ink-2); text-decoration: none;
    padding: 6px 11px; border-radius: var(--r-pill); transition: all .15s; white-space: nowrap; }
  .ai-toc a:hover { background: var(--accent-wash); color: var(--accent-deep); }
  .ai-toc a.active { background: var(--accent); color: #fff; }
  .ai-section { scroll-margin-top: 150px; margin-bottom: 30px; }
  .ai-card-tools { display: flex; gap: 6px; align-items: center; }
  .png-btn { font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: var(--r-pill);
    border: 1px solid var(--line); background: var(--bg-card); color: var(--ink-2); cursor: pointer; }
  .png-btn:hover { border-color: var(--accent); color: var(--accent-deep); }
  .ai-metric-legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 4px; }
  .ai-metric-legend .ml { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600;
    padding: 6px 12px; border-radius: var(--r-pill); border: 1.5px solid var(--line); background: var(--bg-card);
    color: var(--ink-3); cursor: pointer; user-select: none; transition: all .15s; }
  .ai-metric-legend .ml .dot { width: 11px; height: 11px; border-radius: 3px; opacity: .35; }
  .ai-metric-legend .ml.on { color: var(--ink); border-color: currentColor; }
  .ai-metric-legend .ml.on .dot { opacity: 1; }
  .ai-chart-wrap { position: relative; width: 100%; }
  .ai-llms-badge { display: inline-flex; align-items: center; justify-content: center; gap: 3px;
    font-size: 10px; font-weight: 700; line-height: 1; padding: 2px 6px; border-radius: var(--r-pill);
    background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent-deep);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); margin-left: 7px; vertical-align: middle; cursor: help; }
  .ai-ptype-bar { display: flex; height: 26px; border-radius: 6px; overflow: hidden; border: 1px solid var(--line); }
  .ai-ptype-bar span { display: block; height: 100%; }
  .lp-cell { max-width: 420px; }
  .lp-cell a { color: var(--ink); text-decoration: none; font-weight: 500; }
  .lp-cell a:hover { color: var(--accent-deep); text-decoration: underline; }
  .term { border-bottom: 1px dotted var(--ink-3); cursor: help; }
  .delta-pos { color: var(--green); font-weight: 600; }
  .delta-neg { color: var(--red); font-weight: 600; }
  .delta-neu { color: var(--ink-3); }
  .scope-note { font-size: 12px; color: var(--ink-3); background: var(--accent-wash);
    border-radius: var(--r-md); padding: 9px 13px; margin: 4px 0 14px; line-height: 1.5; }
  .ai-grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px,1fr)); gap: 16px; }
  .tbl-wrap { overflow-x: auto; }
  .seg-toggle { display: inline-flex; gap: 0; border: 1px solid var(--line); border-radius: var(--r-pill); overflow: hidden; }
  .seg-toggle button { font-size: 12px; font-weight: 600; padding: 6px 13px; border: none; background: var(--bg-card); color: var(--ink-3); cursor: pointer; }
  .seg-toggle button.on { background: var(--accent); color: #fff; }

  /* ===== v2 additions ===== */
  /* Main (üst) tab nav — gelecekteki analiz türleri için */
  .main-tabs { display:flex; gap:4px; padding:14px 24px 0; flex-wrap:wrap; }
  .main-tab { font-family:'Bricolage Grotesque'; font-weight:700; font-size:14px; padding:11px 20px; border-radius:12px 12px 0 0;
    border:1px solid transparent; border-bottom:none; color:var(--ink-3); background:transparent; cursor:pointer; transition:all .15s; }
  .main-tab:hover:not(.disabled) { color:var(--ink); background:color-mix(in srgb, var(--accent) 7%, transparent); }
  .main-tab.active { color:#fff; background:var(--accent); }
  .main-tab.disabled { opacity:.5; cursor:default; }
  .main-tab .soon { font-size:8.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; background:var(--line); color:var(--ink-3);
    border-radius:var(--r-pill); padding:1px 6px; margin-left:7px; vertical-align:middle; }

  /* Yeni KPI kart tasarımı — gradient/gölge, sol bar YOK */
  .kpi2-grid { display:grid; gap:13px; margin-bottom:18px; }
  .kpi2 { position:relative; border-radius:var(--r-lg); padding:15px 17px; background:var(--bg-card); border:1px solid var(--line);
    box-shadow:var(--shadow-card); overflow:hidden; }
  .kpi2 .k-glow { position:absolute; inset:0; opacity:.9; pointer-events:none; }
  .kpi2 > * { position:relative; }
  .kpi2 .k-label { font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-3); font-weight:700; }
  .kpi2 .k-value { font-family:'Bricolage Grotesque'; font-size:26px; font-weight:700; letter-spacing:-.02em; margin-top:7px; line-height:1.1; }
  .kpi2 .k-sub { font-size:11px; color:var(--ink-3); margin-top:3px; }
  .kpi2 .k-spark { margin-top:9px; height:30px; }

  /* Özet mini-özet kartları */
  .summary-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(255px,1fr)); gap:16px; }
  .summary-card { background:var(--bg-card); border:1px solid var(--line); border-radius:var(--r-lg); padding:16px 18px;
    box-shadow:var(--shadow-card); cursor:pointer; transition:transform .15s, box-shadow .15s; }
  .summary-card:hover { box-shadow:var(--shadow-card-hover); transform:translateY(-2px); }
  .summary-card .sc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .summary-card .sc-title { font-family:'Bricolage Grotesque'; font-weight:700; font-size:14.5px; color:var(--ink); }
  .summary-card .sc-go { font-size:11px; color:var(--accent-deep); font-weight:700; white-space:nowrap; }
  .summary-card .sc-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--line-soft); font-size:12.5px; }
  .summary-card .sc-row:last-child { border-bottom:none; }
  .summary-card .sc-row .nm { color:var(--ink-2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:10px; }
  .summary-card .sc-row .vv { font-family:'Bricolage Grotesque'; font-weight:700; color:var(--ink); white-space:nowrap; }

  /* Arama kutusu */
  .search-box { position:relative; display:inline-block; }
  .search-box input { font-family:inherit; font-size:13px; padding:8px 30px 8px 32px; border:1px solid var(--line); border-radius:var(--r-pill);
    background:var(--bg-card); color:var(--ink); width:280px; max-width:60vw; outline:none; transition:border-color .15s; }
  .search-box input:focus { border-color:var(--accent); }
  .search-box .si { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--ink-3); pointer-events:none; }
  .search-box .clr { position:absolute; right:9px; top:50%; transform:translateY(-50%); border:none; background:none; color:var(--ink-3); cursor:pointer; font-size:15px; line-height:1; }

  /* Filtre satırı */
  .filter-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
  .filter-row .fr-label { font-size:12px; font-weight:700; color:var(--ink-2); }
  .active-filter-chips { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:12px; }
  .active-filter-chips .afc { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:4px 10px;
    border-radius:var(--r-pill); background:var(--accent-wash); color:var(--accent-deep); border:1px solid color-mix(in srgb,var(--accent) 30%, transparent); cursor:pointer; }
  .active-filter-chips .afc .x { font-weight:700; }

  /* clickable chart/cells */
  .clickable-pt { cursor:pointer; }
  .row-clickable { cursor:pointer; }
  .row-clickable:hover { background:var(--accent-wash) !important; }
  .row-active { background:color-mix(in srgb, var(--accent) 12%, transparent) !important; }
  .chart-toolbar { display:flex; gap:6px; align-items:center; }
  .lbl-toggle { font-size:11px; font-weight:600; padding:5px 11px; border-radius:var(--r-pill); border:1px solid var(--line); background:var(--bg-card); color:var(--ink-2); cursor:pointer; }
  .lbl-toggle.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ===== v3: header, tema butonu, soft filtreler, dark palet ===== */
  .topbar .title-block .title { font-size:14px; font-weight:600; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.2); }
  .topbar .title-block .subtitle { font-size:11px; font-family:'Outfit'; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:rgba(255,255,255,.85); }
  .header-right { display:flex; align-items:center; gap:14px; }
  .theme-toggle { display:inline-flex; align-items:center; gap:7px; font-family:'Outfit'; font-weight:600; font-size:12.5px; color:#fff;
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22); border-radius:var(--r-pill); padding:7px 15px; cursor:pointer;
    backdrop-filter:blur(4px); transition:background .18s, transform .15s; }
  .theme-toggle:hover { background:rgba(255,255,255,.24); transform:translateY(-1px); }
  .theme-toggle .tt-icon { font-size:14px; line-height:1; }
  .topbar .inbound-logo-wrap { background:transparent; padding:0; }

  /* Soft ay filtresi + chip butonları (eski-usul border yerine yumuşak pill) */
  .ai-toc { background:var(--bg-card); border:1px solid var(--line); }
  .chip-btn { font-family:'Outfit'; font-weight:600; font-size:12px; padding:7px 13px; border-radius:var(--r-pill);
    border:1px solid transparent; background:color-mix(in srgb, var(--ink-3) 12%, transparent); color:var(--ink-2); cursor:pointer;
    transition:background .16s, color .16s, transform .14s; }
  .chip-btn:hover { background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent-deep); transform:translateY(-1px); }
  .chip-btn.active { background:var(--accent); color:#fff; box-shadow:0 2px 8px color-mix(in srgb, var(--accent) 35%, transparent); }

  /* Sub-tab nav biraz daha soft */
  .tabs { border-bottom:1px solid var(--line); }

  /* Bölüm özeti mini multi-metrik */
  .sc-spark-row { display:flex; gap:6px; margin-top:6px; }
  .sc-metric { flex:1; border-radius:10px; padding:8px 9px; background:color-mix(in srgb, var(--m) 9%, var(--bg-card)); }
  .sc-metric .ml2 { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-3); }
  .sc-metric .mv2 { font-family:'Bricolage Grotesque'; font-weight:700; font-size:15px; color:var(--m); margin-top:1px; }

  /* Marka donut + liste */
  .brand-legend { display:flex; flex-direction:column; gap:2px; max-height:340px; overflow-y:auto; }
  .brand-legend .bl-row { display:grid; grid-template-columns:14px 1fr auto auto auto; gap:9px; align-items:center; padding:7px 8px; border-radius:9px; cursor:pointer; font-size:12.5px; transition:background .14s; }
  .brand-legend .bl-row:hover { background:var(--accent-wash); }
  .brand-legend .bl-row.on { background:color-mix(in srgb, var(--accent) 14%, transparent); }
  .brand-legend .sw { width:11px; height:11px; border-radius:3px; }
  .brand-legend .bl-name { font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .brand-legend .bl-v { font-family:'Bricolage Grotesque'; font-weight:600; font-variant-numeric:tabular-nums; color:var(--ink-2); min-width:54px; text-align:right; }
  .brand-legend .bl-head { display:grid; grid-template-columns:14px 1fr auto auto auto; gap:9px; padding:4px 8px; font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-3); }
  .brand-legend .bl-head span:nth-child(n+3){ min-width:54px; text-align:right; }

  /* DARK — yumuşak nötr gri palet (göz yormayan) */
  [data-theme="dark"] {
    --coral:#FF8A63; --coral-tint:#3A2A22; --coral-deep:#FF9670;
    --teal:#E9EBEE; --ink:#E9EBEE; --ink-2:#A6ABB3; --ink-3:#727781;
    --line:#2C313A; --line-soft:#242932;
    --bg:#16181D; --bg-card:#1D2128; --white:#1D2128;
    --red-wash:#3A2026; --green-wash:#1E3327; --gold:#E0A23C;
    --accent: #FF8A63; --accent-deep:#FF9670; --accent-wash: color-mix(in srgb, #FF8A63 18%, #1D2128);
    --shadow-card:0 1px 3px rgba(0,0,0,.4); --shadow-card-hover:0 6px 22px rgba(0,0,0,.5);
  }
  [data-theme="dark"] body { background-image:none; }
  [data-theme="dark"] .kpi2 .k-glow { opacity:.6; }

  /* ===== v4: premium başlıklar, not kartları, modal, heat ===== */
  .ai-section > .card-header { align-items:flex-start; padding-bottom:14px; border-bottom:1px solid var(--line-soft); margin-bottom:4px; }
  .ai-section > .card-header strong { font-family:'Bricolage Grotesque'; font-weight:700; font-size:18px; letter-spacing:-.01em; color:var(--ink);
    display:inline-flex; align-items:center; gap:9px; }
  .ai-section > .card-header strong::before { content:''; width:7px; height:18px; border-radius:3px; background:linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 55%, transparent)); flex:none; }
  .card-header .ai-card-tools .png-btn { background:var(--bg-card); }

  /* Not kartları */
  .note-card { display:flex; gap:12px; align-items:flex-start; background:color-mix(in srgb, var(--accent) 6%, var(--bg-card));
    border:1px solid color-mix(in srgb, var(--accent) 22%, transparent); border-left:4px solid var(--accent); border-radius:var(--r-md); padding:13px 16px; margin-bottom:14px; }
  .note-card.method { background:color-mix(in srgb, #1565C0 6%, var(--bg-card)); border-color:color-mix(in srgb,#1565C0 22%,transparent); border-left-color:#1565C0; }
  .note-card .note-label { font-family:'Bricolage Grotesque'; font-weight:700; font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--accent-deep); background:var(--bg-card); border-radius:var(--r-pill); padding:4px 10px; white-space:nowrap; flex:none; margin-top:1px; }
  .note-card.method .note-label { color:#1565C0; }
  .note-card .note-body { font-size:12.5px; line-height:1.55; color:var(--ink-2); }
  .note-card .note-body strong { color:var(--ink); }

  /* Modal */
  .ai-modal-overlay { position:fixed; inset:0; background:rgba(16,51,47,.5); backdrop-filter:blur(3px); z-index:200; display:flex; align-items:center; justify-content:center; padding:24px; animation:tab-fade-in .2s ease-out; }
  .ai-modal { background:var(--bg-card); border:1px solid var(--line); border-radius:var(--r-xl); width:100%; max-height:88vh; overflow:auto; box-shadow:var(--shadow-pop); }
  .ai-modal-head { position:sticky; top:0; background:var(--bg-card); display:flex; justify-content:space-between; align-items:center; padding:18px 22px 14px; border-bottom:1px solid var(--line); z-index:1; }
  .ai-modal-head strong { font-family:'Bricolage Grotesque'; font-weight:700; font-size:18px; color:var(--ink); }
  .ai-modal-x { border:none; background:var(--line-soft); color:var(--ink-2); width:30px; height:30px; border-radius:50%; font-size:18px; cursor:pointer; line-height:1; }
  .ai-modal-x:hover { background:var(--accent); color:#fff; }
  .ai-modal-body { padding:20px 22px 24px; }

  /* Heat delta + scroll */
  .heatmap-scroll { overflow-x:auto; padding-bottom:4px; }
  .heatmap-scroll .heatmap .hm-cell { aspect-ratio:auto !important; height:38px; font-size:11.5px; }
  .heatmap-scroll .heatmap .hm-row-label { height:38px; display:flex; flex-direction:column; justify-content:center; font-size:12.5px; }
  .heatmap-scroll .heatmap .hm-head { display:flex; align-items:center; justify-content:center; }
  .heatmap .hm-delta { display:flex; align-items:center; justify-content:flex-end; font-family:'Bricolage Grotesque'; font-weight:700; font-size:12px; padding-right:4px; height:38px; }
  .heatmap .hm-row-label.clickable, .heatmap .hm-cell.clickable { cursor:pointer; }
  .heatmap .hm-row-label.clickable:hover span { color:var(--accent-deep); }
  .heat-metric-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px; }

  /* ===== v5: scroll performansı ===== */
  /* A — sabit gradient arka plan kaldırıldı (her scroll karesinde repaint sebebiydi) */
  body { background-image:none !important; background-attachment:scroll !important; }
  /* B — global smooth scroll kapalı (ToC/sekme tıklamaları JS ile yine smooth çalışır) */
  html { scroll-behavior:auto !important; }
  /* C — tema butonundaki backdrop blur kaldırıldı */
  .theme-toggle { backdrop-filter:none !important; }
  /* D — ekran dışı bölümleri tembel render et (chart içermeyen bölümlerde) */
  .ai-section:not(:has(canvas)) { content-visibility:auto; contain-intrinsic-size:auto 600px; }
  .summary-card { content-visibility:auto; contain-intrinsic-size:auto 220px; }
  /* "daha fazla" satır kontrolü */
  .tbl-more { text-align:center; margin-top:12px; }

  /* ===== v5: mobil / responsive ===== */
  @media (max-width: 720px) {
    .content { padding:14px 12px 70px; }
    .topbar { padding:12px 14px; gap:10px; flex-wrap:wrap; }
    .topbar .logo img { height:24px !important; }
    .topbar .title-block .title { font-size:12px; }
    .header-right { gap:8px; }
    .theme-toggle { padding:6px 11px; font-size:11.5px; }
    /* sekme barları yatay kaydırma */
    .main-tabs, .tabs { flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .main-tabs::-webkit-scrollbar, .tabs::-webkit-scrollbar { display:none; }
    .tab, .main-tab { white-space:nowrap; flex:none; padding:11px 13px; font-size:13px; }
    .kpi2 .k-value { font-size:22px; }
    /* filtre satırı sar */
    .filter-row { flex-direction:column; align-items:stretch; }
    .filter-row .multiselect, .filter-row .search-box, .filter-row .search-box input { width:100% !important; }
    .seg-toggle { width:100%; }
    .seg-toggle button { flex:1; }
    .ai-metric-legend { gap:6px; }
    /* modal tam ekran */
    .ai-modal { max-width:96vw !important; max-height:92vh; }
    .ai-modal-body { padding:14px 14px 18px; }
    /* başlık biraz küçült */
    .ai-section > .card-header strong { font-size:16px; }
    .ai-toc { position:static; }
    /* ay filtresi yatay kaydırma yerine sar (zaten sarıyor) */
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Libraries (CDN) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- Data + app -->
<script src="data/ai-data.js"></script>
<script src="utils.js"></script>
<script src="ai-utils.js"></script>
<script type="text/babel" data-presets="react" src="components.jsx"></script>
<script type="text/babel" data-presets="react" src="tabs.jsx"></script>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
